<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>NEWS INTEL</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body {
      background: #05070a;
      color: white;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->

  <div class="fixed inset-0 opacity-20 pointer-events-none">

    <div class="absolute top-0 left-0 w-96 h-96 bg-cyan-500 blur-[150px]"></div>

    <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-500 blur-[150px]"></div>

  </div>

  <!-- HEADER -->

  <header class="sticky top-0 z-50 glass">

    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">

      <div>

        <h1 class="text-3xl font-black tracking-tight">
          NEWS <span class="text-cyan-400">INTEL</span>
        </h1>

        <p class="text-xs uppercase tracking-[0.3em] text-slate-500 mt-2">
          World Mystery Tracking Network
        </p>

      </div>

      <div class="text-xs uppercase tracking-widest text-slate-500 font-bold">
        Realtime Investigation Feed
      </div>

    </div>

  </header>

  <!-- MAIN -->

  <main class="max-w-7xl mx-auto px-6 py-10 relative z-10">

    <div class="grid lg:grid-cols-3 gap-8">

      <!-- FORM -->

      <div class="lg:col-span-1">

        <div class="glass rounded-3xl p-8 sticky top-28">

          <h2 class="text-2xl font-black mb-6">
            Submit Mystery
          </h2>

          <form id="mysteryForm" class="space-y-5">

            <input
              id="title"
              type="text"
              placeholder="Mystery Title"
              class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 outline-none"
            />

            <textarea
              id="description"
              placeholder="Mystery Description"
              rows="6"
              class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 outline-none resize-none"
            ></textarea>

            <select
              id="category"
              class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 outline-none"
            >
              <option>Breaking News</option>
              <option>Crime</option>
              <option>Paranormal</option>
              <option>Social Viral</option>
              <option>Tech</option>
              <option>UFO/Military</option>
            </select>

            <button
              type="submit"
              class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-2xl transition-all"
            >
              Broadcast Intel
            </button>

          </form>

        </div>

      </div>

      <!-- CONTENT -->

      <div class="lg:col-span-2 space-y-8">

        <!-- SEARCH -->

        <div class="glass rounded-3xl p-5">

          <input
            id="searchInput"
            type="text"
            placeholder="Search mystery news..."
            class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 outline-none"
          />

        </div>

        <!-- STATS -->

        <div class="grid md:grid-cols-3 gap-5">

          <div class="glass rounded-3xl p-6">

            <p class="text-slate-500 text-xs uppercase tracking-widest font-bold mb-2">
              Total Records
            </p>

            <h2
              id="totalCount"
              class="text-4xl font-black"
            >
              0
            </h2>

          </div>

          <div class="glass rounded-3xl p-6">

            <p class="text-slate-500 text-xs uppercase tracking-widest font-bold mb-2">
              Solved
            </p>

            <h2
              id="solvedCount"
              class="text-4xl font-black text-emerald-400"
            >
              0
            </h2>

          </div>

          <div class="glass rounded-3xl p-6">

            <p class="text-slate-500 text-xs uppercase tracking-widest font-bold mb-2">
              Unsolved
            </p>

            <h2
              id="unsolvedCount"
              class="text-4xl font-black text-rose-400"
            >
              0
            </h2>

          </div>

        </div>

        <!-- LIST -->

        <div
          id="mysteryList"
          class="grid md:grid-cols-2 gap-6"
        ></div>

      </div>

    </div>

  </main>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }

    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {

      getFirestore,

      collection,

      addDoc,

      deleteDoc,

      updateDoc,

      doc,

      onSnapshot

    }

    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {

      apiKey: "AIzaSyBmsAClSWTfopqVJd8myG7vqQDSd9Z2XkA",

      authDomain: "mystery-fff8d.firebaseapp.com",

      projectId: "mystery-fff8d",

      storageBucket: "mystery-fff8d.firebasestorage.app",

      messagingSenderId: "1082125532602",

      appId: "1:1082125532602:web:33b205e3047200d95d3183"
    };

    const app =
      initializeApp(firebaseConfig);

    const db =
      getFirestore(app);

    const mysteryCollection =
      collection(db, "mysteries");

    let mysteries = [];

    // REALTIME

    onSnapshot(mysteryCollection, (snapshot) => {

      mysteries =
        snapshot.docs.map((docItem) => ({
          id: docItem.id,
          ...docItem.data()
        }));

      mysteries.sort(
        (a, b) =>
          b.createdAt - a.createdAt
      );

      renderMysteries();
    });

    // ADD

    document
      .getElementById("mysteryForm")
      .addEventListener("submit", async (e) => {

        e.preventDefault();

        const title =
          document
            .getElementById("title")
            .value
            .trim();

        const description =
          document
            .getElementById("description")
            .value
            .trim();

        const category =
          document
            .getElementById("category")
            .value;

        if (!title || !description) {

          alert("Fill all fields");

          return;
        }

        await addDoc(
          mysteryCollection,
          {
            title,
            description,
            category,
            status: "Unsolved",
            createdAt: Date.now()
          }
        );

        document.getElementById("title").value = "";

        document.getElementById("description").value = "";
      });

    // SEARCH

    document
      .getElementById("searchInput")
      .addEventListener("keyup", renderMysteries);

    // RENDER

    function renderMysteries() {

      const container =
        document.getElementById("mysteryList");

      const search =
        document
          .getElementById("searchInput")
          .value
          .toLowerCase();

      container.innerHTML = "";

      let solved = 0;

      mysteries.forEach((mystery) => {

        const titleMatch =
          mystery.title
            .toLowerCase()
            .includes(search);

        const descMatch =
          mystery.description
            .toLowerCase()
            .includes(search);

        if (!titleMatch && !descMatch) {
          return;
        }

        if (mystery.status === "Solved") {
          solved++;
        }

        const statusColor =

          mystery.status === "Solved"

            ? "bg-emerald-500/20 text-emerald-400"

            : "bg-rose-500/20 text-rose-400";

        const card =
          document.createElement("div");

        card.className =
          "glass rounded-3xl p-6";

        card.innerHTML = `

          <div class="flex justify-between items-start gap-4 mb-5">

            <div>

              <h2 class="text-2xl font-black text-white mb-2">
                ${mystery.title}
              </h2>

              <div class="flex gap-2 flex-wrap">

                <span class="px-3 py-1 rounded-full text-xs ${statusColor}">
                  ${mystery.status}
                </span>

                <span class="px-3 py-1 rounded-full text-xs bg-cyan-500/20 text-cyan-400">
                  ${mystery.category}
                </span>

              </div>

            </div>

          </div>

          <p class="text-slate-300 leading-7 whitespace-pre-wrap mb-6">
            ${mystery.description}
          </p>

          <div class="flex flex-wrap gap-3">

            <button
              class="solveBtn bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-xl text-sm font-bold"
              data-id="${mystery.id}"
            >
              Toggle Status
            </button>

            <button
              class="editBtn bg-yellow-500 hover:bg-yellow-400 text-black px-4 py-2 rounded-xl text-sm font-bold"
              data-id="${mystery.id}"
            >
              Edit
            </button>

            <button
              class="deleteBtn bg-rose-600 hover:bg-rose-500 px-4 py-2 rounded-xl text-sm font-bold"
              data-id="${mystery.id}"
            >
              Delete
            </button>

          </div>
        `;

        container.appendChild(card);
      });

      // STATS

      document.getElementById("totalCount").innerText =
        mysteries.length;

      document.getElementById("solvedCount").innerText =
        solved;

      document.getElementById("unsolvedCount").innerText =
        mysteries.length - solved;

      bindButtons();
    }

    // BUTTONS

    function bindButtons() {

      // DELETE

      document
        .querySelectorAll(".deleteBtn")
        .forEach((btn) => {

          btn.addEventListener("click", async () => {

            const id =
              btn.dataset.id;

            await deleteDoc(
              doc(db, "mysteries", id)
            );
          });
        });

      // SOLVE

      document
        .querySelectorAll(".solveBtn")
        .forEach((btn) => {

          btn.addEventListener("click", async () => {

            const id =
              btn.dataset.id;

            const mystery =
              mysteries.find(m => m.id === id);

            const nextStatus =

              mystery.status === "Solved"

                ? "Unsolved"

                : "Solved";

            await updateDoc(
              doc(db, "mysteries", id),
              {
                status: nextStatus
              }
            );
          });
        });

      // EDIT

      document
        .querySelectorAll(".editBtn")
        .forEach((btn) => {

          btn.addEventListener("click", async () => {

            const id =
              btn.dataset.id;

            const mystery =
              mysteries.find(m => m.id === id);

            const newTitle =
              prompt(
                "Edit Title",
                mystery.title
              );

            if (newTitle === null) {
              return;
            }

            const newDesc =
              prompt(
                "Edit Description",
                mystery.description
              );

            if (newDesc === null) {
              return;
            }

            await updateDoc(
              doc(db, "mysteries", id),
              {
                title: newTitle,
                description: newDesc
              }
            );
          });
        });
    }

  </script>

</body>
</html>
